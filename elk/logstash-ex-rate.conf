input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/drivers/mariadb-java-client-3.1.4.jar"
    jdbc_driver_class => "org.mariadb.jdbc.Driver"
    jdbc_connection_string => "jdbc:mariadb://15.165.57.30:3306/sound_bank
    jdbc_user => "admin"
    jdbc_password => "soundbank18"
    statement => "SELECT * FROM exchange_rate WHERE base_date > :sql_last_value"
    schedule => "11 11 * * *"
    jdbc_default_timezone => "Asia/Seoul"
    jdbc_paging_enabled => false
    use_column_value => true
    tracking_column => "base_date"
    record_last_run => true
    last_run_metadata_path => "/usr/share/logstash/.logstash_exchange_rate_last_run"
  }
}

filter {
  mutate {
    rename => {
      "BASE_DATE"      => "base_date"
      "CURRENCY_CODE"  => "currency_code"
      "CURRENCY_NAME"  => "currency_name"
      "BASE_RATE"      => "base_rate"
      "BUY_RATE"       => "buy_rate"
      "SELL_RATE"      => "sell_rate"
      "CREATED_AT"     => "created_at"
      "FEE_RATE"       => "fee_rate"
    }
  }
  date {
    match => ["base_date", "yyyy-MM-dd"]
    target => "base_date"
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "exchange_rate_data"
    document_id => "%{currency_code}_%{base_date}"
  }
  stdout {
    codec => json_lines
  }
}
